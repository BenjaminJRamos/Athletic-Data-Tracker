version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: fitData_pipeline_db
    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: fitsync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: